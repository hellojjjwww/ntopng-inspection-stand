name: PR validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.desktop.yml config --quiet

      - name: Validate Bash syntax
        run: |
          bash -n install.sh
          bash -n deploy/scripts/tests/validate_stack.sh
          bash -n deploy/scripts/tests/collect_evidence.sh
          bash -n scripts/setup_geolite2.sh
          bash -n scripts/doctor.sh
          bash -n scripts/backup.sh
          bash -n scripts/enable_russian_ui.sh

      - name: Check required files
        run: |
          test -f LICENSE.txt
          test -f Makefile
          test -f config/zeek/local.zeek
          test -f config/ntopng/locales/ru.lua
          test -f docs/deployment.md
          test -f docs/testing.md
          test -f docs/alerts.md
          test -f docs/demo_scenario.md

      - name: Validate Python syntax
        run: python3 -m py_compile scripts/generate_anomaly.py scripts/prepare_htpasswd.py scripts/build_instruction_pdf.py
