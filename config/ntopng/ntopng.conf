# Bind the ntopng UI to localhost only. Nginx exposes it with Basic Auth.
--http-port=127.0.0.1:3000

# Redis backend for preferences, runtime cache, and user configuration.
--redis=127.0.0.1:6379@0

# Persistent ntopng state and time-series.
--data-dir=/var/lib/ntopng

# Run the free Community Edition instead of the time-limited trial mode.
--community

# Nginx Basic Auth is the access boundary for this lab, so avoid ntopng lockouts.
--disable-login=1

# Enable DNS decoding/resolution where possible.
--dns-mode=1

--verbose
